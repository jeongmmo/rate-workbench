<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>전망 적중도 추적 · Forecast Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#16213a; --ink2:#3a4a6b; --muted:#6b7488;
    --line:#d9dde6; --line2:#eceef3;
    --accent:#1f3a6e; --accent-soft:#eaf0f9;
    --paper:#f4efe4; --card:#ffffff; --good:#2f6f6b; --bad:#a23b3b; --warn:#b07d2b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:'Times New Roman',Times,Georgia,serif;font-size:16px;line-height:1.5;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px 90px;}
  header.mast{border-bottom:2px solid var(--ink);padding:34px 0 18px;}
  .eyebrow{font-variant:small-caps;letter-spacing:.14em;font-size:.82rem;color:var(--accent);margin:0 0 6px;}
  h1.title{font-size:2rem;font-weight:700;margin:0 0 6px;}
  .subtitle{font-size:1rem;color:var(--ink2);font-style:italic;margin:0;}
  a.back{font-size:.86rem;color:var(--accent);}
  #status{margin:18px 0;font-size:.92rem;}
  #status.err{color:var(--bad)} #status.busy{color:var(--warn);font-style:italic}

  h2.sec{font-size:1.16rem;margin:36px 0 4px;font-weight:700;}
  h2.sec .num{font-variant:small-caps;font-size:.78rem;color:var(--accent);margin-right:9px;letter-spacing:.1em;}
  p.secdesc{margin:0 0 14px;color:var(--ink2);font-size:.92rem;}

  table.reg{border-collapse:collapse;font-size:.92rem;margin:6px 0 4px;width:100%;}
  table.reg th{font-variant:small-caps;font-size:.78rem;letter-spacing:.06em;color:var(--muted);
    border-top:1.5px solid var(--ink);border-bottom:1px solid var(--line);padding:7px 12px 7px 0;text-align:right;font-weight:700;}
  table.reg th:first-child{text-align:left;}
  table.reg td{border-bottom:1px solid var(--line2);padding:6px 12px 6px 0;text-align:right;font-variant-numeric:tabular-nums;}
  table.reg td:first-child{text-align:left;}
  table.reg tr:last-child td{border-bottom:1.5px solid var(--ink);}
  .tnote{font-size:.82rem;color:var(--muted);font-style:italic;margin:2px 0 0;}
  .pos{color:var(--bad)} .neg{color:var(--good)}

  .ctrl{display:flex;gap:10px;align-items:center;margin:0 0 12px;flex-wrap:wrap;}
  .ctrl label{font-variant:small-caps;font-size:.8rem;color:var(--muted);letter-spacing:.06em;}
  select{font-family:inherit;font-size:.95rem;padding:5px 8px;border:1px solid var(--line);background:#fff;color:var(--ink);}
  .chartbox{border:1px solid var(--line);padding:14px;background:var(--card,#fff);box-shadow:0 1px 3px rgba(60,50,30,0.05);}
  canvas{max-height:420px;}
</style>
  <script src="./common.js"></script>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <p class="eyebrow">Forecast Vintages · Accuracy Measurement</p>
    <h1 class="title">전망 적중도 추적</h1>
    <p class="subtitle">전망 빈티지를 실현치와 자동 대조.</p>
    <p style="margin:10px 0 0"><a class="back" href="index.html">← 포털로</a></p>
  </header>
  <div id="status" class="busy">결과 불러오는 중 …</div>
  <div id="content" style="display:none">

    <h2 class="sec"><span class="num">§ 1</span>빈티지 차트</h2>
    <p class="secdesc">굵은 선=실현치, 가는 선=각 시점 전망 경로.</p>
    <div class="ctrl"><label>변수</label><select id="varSel"></select></div>
    <div class="chartbox"><canvas id="hedgehog"></canvas></div>

    <h2 class="sec"><span class="num">§ 2</span>변수별 적중도</h2>
    <p class="secdesc">오차 = 전망 − 실현. ME 음수 = 과소전망. 방향적중률은 상승/하락 방향을 맞힌 비율.</p>
    <div id="byVar"></div>

    <h2 class="sec"><span class="num">§ 3</span>호라이즌별 적중도</h2>
    <p class="secdesc">전망 시점~목표 분기말 거리별 성적.</p>
    <div id="byHz"></div>

    <h2 class="sec"><span class="num">§ 4</span>개별 기록</h2>
    <div class="ctrl"><label>변수</label><select id="recSel"></select>
      <label><input type="checkbox" id="onlyDone" checked> 평가완료만</label></div>
    <div id="records"></div>
  </div>
</div>
<script>
(async function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var status=$("status");
  Chart.defaults.font.family="'Times New Roman',Times,serif";
  Chart.defaults.color="#16213a";

  function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!==undefined)e.innerHTML=h;return e;}
  function fmt(v,d){return v===null||v===undefined?"—":Number(v).toFixed(d===undefined?3:d);}
  function signed(v){if(v===null||v===undefined)return "—";
    var s=Number(v);return "<span class='"+(s>0?"pos":"neg")+"'>"+(s>0?"+":"")+s.toFixed(3)+"</span>";}

  function summaryTable(obj,keyLabel){
    var t=el("table","reg");
    t.appendChild(el("thead","","<tr><th>"+keyLabel+"</th><th>N</th><th>ME</th><th>MAE</th><th>RMSE</th><th>방향적중률</th></tr>"));
    var tb=el("tbody");
    Object.keys(obj).sort().forEach(function(k){
      var v=obj[k];
      tb.appendChild(el("tr","","<td>"+k+"</td><td>"+v.n+"</td><td>"+signed(v.me)+"</td><td>"+fmt(v.mae)+
        "</td><td>"+fmt(v.rmse)+"</td><td>"+(v.hit_rate===null?"—":(v.hit_rate*100).toFixed(0)+"%")+"</td>"));
    });
    t.appendChild(tb);return t;
  }

  function recordsTable(recs){
    var t=el("table","reg");
    t.appendChild(el("thead","","<tr><th>전망일</th><th>타깃</th><th>호라이즌</th><th>전망</th><th>실현</th><th>오차</th><th>방향</th></tr>"));
    var tb=el("tbody");
    recs.forEach(function(r){
      tb.appendChild(el("tr","","<td>"+r.forecast_date+"</td><td>"+r.target+"</td><td>"+r.horizon_days+"일</td>"+
        "<td>"+fmt(r.forecast,2)+"</td><td>"+(r.realized===null?"미도래":fmt(r.realized,2))+"</td>"+
        "<td>"+(r.error===null?"—":signed(r.error))+"</td>"+
        "<td>"+(r.direction_hit===null?"—":r.direction_hit?"○":"×")+"</td>"));
    });
    t.appendChild(tb);return t;
  }

  var chart=null;
  function drawHedgehog(data,variable){
    var rq=data.realized_series;
    var realized=rq.dates.map(function(d,i){return {x:d,y:rq.values[variable]?rq.values[variable][i]:null};})
                  .filter(function(p){return p.y!==null;});
    // 빈티지별 전망 경로: 앵커(전망일, 시장수준) → 타깃 분기말 전망값들
    var groups={};
    data.records.filter(function(r){return r.variable===variable;}).forEach(function(r){
      (groups[r.forecast_date]=groups[r.forecast_date]||[]).push(r);
    });
    var paths=Object.keys(groups).sort().map(function(fd,gi){
      var rs=groups[fd].sort(function(a,b){return a.target_end<b.target_end?-1:1;});
      var pts=[];
      if(rs[0].anchor!==null)pts.push({x:fd,y:rs[0].anchor});
      rs.forEach(function(r){pts.push({x:r.target_end,y:r.forecast});});
      return {label:fd+" 전망",data:pts,borderColor:"rgba(63,90,138,"+(0.25+0.6*gi/Math.max(1,Object.keys(groups).length-1))+")",
        borderWidth:1.2,pointRadius:2,fill:false,tension:0};
    });
    var ds=[{label:"실현치(분기말)",data:realized,borderColor:"#16213a",borderWidth:2.6,pointRadius:3,fill:false,tension:0}].concat(paths);
    if(chart)chart.destroy();
    chart=new Chart($("hedgehog"),{type:"line",
      data:{datasets:ds},
      options:{responsive:true,parsing:{xAxisKey:"x",yAxisKey:"y"},
        plugins:{legend:{display:false},title:{display:true,text:variable+" — 전망 빈티지 vs 실현치",font:{size:15}}},
        scales:{x:{type:"category",labels:buildAxis(realized,paths),grid:{color:"#eceef3"}},
                y:{grid:{color:"#eceef3"},title:{display:true,text:"연 %"}}},
        backgroundColor:"#ffffff"}});
  }
  function buildAxis(realized,paths){
    var set={};realized.forEach(function(p){set[p.x]=1;});
    paths.forEach(function(p){p.data.forEach(function(q){set[q.x]=1;});});
    return Object.keys(set).sort();
  }

  try{
    var cfg=GHCommon.currentConfig();
    var data=await GHCommon.loadResults(cfg,"forecast_eval");
    status.textContent="생성 시각(UTC): "+data.generated_utc+" · 기준: "+data.convention+
      " · 시장데이터 최종일 "+data.market_last_obs+" · 전망 "+data.n_total+"건 중 평가 "+data.n_evaluated+"건";
    status.className="";
    $("content").style.display="";

    var vars=Object.keys(data.summary_by_variable).sort();
    var allVars=[];data.records.forEach(function(r){if(allVars.indexOf(r.variable)<0)allVars.push(r.variable);});
    allVars.sort();
    vars.concat(allVars.filter(function(v){return vars.indexOf(v)<0;}));
    allVars.forEach(function(v){
      $("varSel").appendChild(new Option(v,v));
      $("recSel").appendChild(new Option(v,v));
    });
    $("byVar").appendChild(summaryTable(data.summary_by_variable,"변수"));
    $("byVar").appendChild(el("p","tnote","오차 단위: %p · ME 양(+)=과대전망(빨강 계열) · 음(−)=과소전망"));
    $("byHz").appendChild(summaryTable(data.summary_by_horizon,"호라이즌"));

    function refreshRecords(){
      var v=$("recSel").value,only=$("onlyDone").checked;
      var recs=data.records.filter(function(r){return r.variable===v&&(!only||r.error!==null);});
      $("records").innerHTML="";$("records").appendChild(recordsTable(recs));
    }
    $("varSel").addEventListener("change",function(){drawHedgehog(data,this.value);});
    $("recSel").addEventListener("change",refreshRecords);
    $("onlyDone").addEventListener("change",refreshRecords);
    drawHedgehog(data,allVars[0]);refreshRecords();
    if(data.missing_variables.length)
      status.innerHTML+=" · <span style='color:var(--warn)'>매핑 안 된 변수: "+data.missing_variables.join(", ")+"</span>";
  }catch(e){
    status.className="err";
    status.innerHTML="결과를 불러오지 못했습니다 — "+e.message+
      "<br>① research-data에 data/forecasts.xlsx가 푸시되어 Actions가 한 번 돌았는지, ② <a href='index.html'>포털</a>에서 토큰 연결을 했는지 확인하세요.";
  }
})();
</script>
</body>
</html>
